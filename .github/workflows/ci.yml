name: frontend ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Typecheck
        run: bun run typecheck
      - name: Lint (eslint)
        run: bun run lint
      - name: Lint FSD boundaries (steiger)
        run: bun run lint:fsd
      - name: Tests (vitest)
        run: bun run test
      - name: Build
        run: bun run build
